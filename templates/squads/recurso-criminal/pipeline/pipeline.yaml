name: "Pipeline — Sala de Recursos Criminais"
version: "1.0.0"
created: "2026-06-17"
squad: "recurso-criminal"

description: >
  Pipeline completo para transformar uma decisão adversa em peça recursal pronta
  para protocolo. 3 checkpoints de controle garantem que o advogado confirma a
  decisão atacada, a peça/prazo escolhidos e a versão final antes do protocolo.
  A tempestividade é conferida em todos os steps como gate crítico.

mode: "alta-performance"

steps:
  - id: step-01
    name: "Decisão Atacada"
    type: checkpoint
    file: steps/step-01-decisao-atacada.md

  - id: step-02
    name: "Classificação do Cabimento"
    type: agent
    agent: classificador
    file: steps/step-02-classificar-cabimento.md
    depends_on: step-01

  - id: step-03
    name: "Confirmar Peça"
    type: checkpoint
    file: steps/step-03-confirmar-peca.md
    depends_on: step-02

  - id: step-04
    name: "Pesquisa de Precedentes"
    type: agent
    agent: pesquisador
    file: steps/step-04-pesquisar-precedentes.md
    depends_on: step-03

  - id: step-05
    name: "Redação do Recurso"
    type: agent
    agent: redator
    file: steps/step-05-redigir-recurso.md
    depends_on: step-04

  - id: step-06
    name: "Aprovar Peça"
    type: checkpoint
    file: steps/step-06-aprovar-peca.md
    depends_on: step-05

  - id: step-07
    name: "Revisão Final"
    type: agent
    agent: revisor
    optional: false
    file: steps/step-07-revisar.md
    depends_on: step-06
    on_reject: step-05
    max_review_cycles: 3
    output:
      artifacts:
        - output/revisao-final.md

checkpoints:
  - step-01  # Decisão atacada: anexar peça + unanimidade + data/prazo
  - step-03  # Confirmar peça recursal e prazo
  - step-06  # Aprovar versão final da peça

# Loop de revisão (não-opcional): se a revisora (Step 07) emitir REJECT,
# o pipeline retorna ao Step 05 (redação) com a lista `fixes` (feedback-delta) e
# retoma para a frente pelo checkpoint Step 06 (re-aprovação da peça a cada ciclo),
# até a peça receber APPROVE ou atingir max_review_cycles. Ver on_reject em step-07.
# O APPROVE fica condicionado ao veredito do verificador-citacoes (Citation Gate).

output:
  artifacts:
    - output/decisao.md
    - output/cabimento.md
    - output/precedentes.md
    - output/recurso.md
    - output/revisao-final.md
