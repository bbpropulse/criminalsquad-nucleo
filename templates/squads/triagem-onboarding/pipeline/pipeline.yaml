name: "Pipeline — Triagem e Onboarding de Cliente"
version: "1.0.0"
created: "2026-06-17"
squad: "triagem-onboarding"

description: >
  Pipeline completo do ciclo de entrada de cliente — do intake à comunicação de
  boas-vindas. 3 checkpoints de controle garantem que o advogado aprova cada
  decisão crítica: os dados do caso (Step 01), a decisão aceitar/declinar
  (Step 03) e a proposta + onboarding (Step 06). O checkpoint do Step 03 é uma
  bifurcação: se o advogado DECLINAR, o pipeline encerra com uma carta de
  declínio respeitosa e não executa os Steps 04-07.

mode: "alta-performance"

steps:
  - id: step-01
    name: "Dados do Caso"
    type: checkpoint
    file: steps/step-01-dados-do-caso.md
    output:
      artifacts:
        - output/intake.md

  - id: step-02
    name: "Triagem do Caso"
    type: agent
    agent: triagem
    file: steps/step-02-triagem.md
    depends_on: step-01
    output:
      artifacts:
        - output/triagem.md

  - id: step-03
    name: "Decisão: Aceitar/Declinar"
    type: checkpoint
    file: steps/step-03-decisao.md
    depends_on: step-02
    output:
      artifacts:
        - output/decisao.md
        - output/carta-declinio.md  # somente no caminho "declinar"

  - id: step-04
    name: "Onboarding do Cliente"
    type: agent
    agent: onboarding
    file: steps/step-04-onboarding.md
    depends_on: step-03
    output:
      artifacts:
        - output/onboarding.md

  - id: step-05
    name: "Proposta de Honorários"
    type: agent
    agent: honorarios
    file: steps/step-05-honorarios.md
    depends_on: step-04
    output:
      artifacts:
        - output/proposta-honorarios.md

  - id: step-06
    name: "Aprovar Proposta/Onboarding"
    type: checkpoint
    file: steps/step-06-aprovar-proposta.md
    depends_on: step-05

  - id: step-07
    name: "Comunicação ao Cliente"
    type: agent
    agent: comunicador
    file: steps/step-07-comunicacao.md
    depends_on: step-06
    output:
      artifacts:
        - output/comunicacao.md

checkpoints:
  - step-01  # Dados do caso: relato, tipo penal, urgência
  - step-03  # Decisão aceitar/declinar (bifurcação: declinar encerra o pipeline)
  - step-06  # Aprovação da proposta de honorários e do onboarding

# Bifurcação do Step 03 (Decisão):
#   ACEITAR  → segue para Step 04 (onboarding) → Step 05 (honorários) → ...
#   DECLINAR → o pipeline ENCERRA neste ponto; gera output/carta-declinio.md
#              (carta de declínio respeitosa) e NÃO executa os Steps 04-07.
#   ENCAMINHAR → variação do declínio: encerra com indicação a colega/defensoria.

output:
  artifacts:
    - output/intake.md
    - output/triagem.md
    - output/decisao.md
    - output/carta-declinio.md
    - output/onboarding.md
    - output/proposta-honorarios.md
    - output/comunicacao.md
