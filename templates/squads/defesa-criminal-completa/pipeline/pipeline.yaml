name: "Pipeline — Defesa Criminal Completa"
version: "1.0.0"
created: "2026-06-17"
squad: "defesa-criminal-completa"

description: >
  Pipeline completo da defesa criminal — do recebimento da citação à RESPOSTA À
  ACUSAÇÃO protocolável (CPP 396 e 396-A). 4 checkpoints de controle garantem que
  o advogado aprova cada decisão crítica (foco do caso, seleção de teses, minuta e
  versão final) antes de avançar. A revisão jurídica do Step 07 não é opcional: em
  caso de REJECT, o pipeline retorna ao Step 05 (redação) até a peça ser aprovada.

mode: "alta-performance"

steps:
  - id: step-01
    name: "Foco do Caso"
    type: checkpoint
    file: steps/step-01-foco-do-caso.md

  - id: step-02
    name: "Resumo dos Autos"
    type: agent
    agent: leitor
    file: steps/step-02-resumo-autos.md
    depends_on: step-01
    output:
      artifacts:
        - output/resumo-autos.md

  - id: step-03
    name: "Pesquisa Jurídica"
    type: agent
    agent: pesquisador
    model: powerful
    file: steps/step-03-pesquisa-juridica.md
    depends_on: step-02
    output:
      artifacts:
        - output/pesquisa-juridica.md

  - id: step-04
    name: "Seleção de Teses"
    type: checkpoint
    file: steps/step-04-selecao-teses.md
    depends_on: step-03
    output:
      artifacts:
        - output/teses-selecionadas.md

  - id: step-05
    name: "Redação da Minuta"
    type: agent
    agent: redator
    file: steps/step-05-redacao-minuta.md
    depends_on: step-04
    output:
      artifacts:
        - output/resposta-acusacao-minuta.md

  - id: step-06
    name: "Aprovar Minuta"
    type: checkpoint
    file: steps/step-06-aprovar-minuta.md
    depends_on: step-05

  - id: step-07
    name: "Revisão Jurídica"
    type: agent
    agent: revisor
    optional: false
    file: steps/step-07-revisao-juridica.md
    depends_on: step-06
    on_reject: step-05
    max_review_cycles: 3
    output:
      artifacts:
        - output/revisao-juridica.md

  - id: step-08
    name: "Aprovar Final"
    type: checkpoint
    file: steps/step-08-aprovar-final.md
    depends_on: step-07

  - id: step-09
    name: "Checklist de Protocolo"
    type: agent
    agent: protocolo
    file: steps/step-09-protocolo.md
    depends_on: step-08
    output:
      artifacts:
        - output/checklist-protocolo.md
        - output/resposta-acusacao-final.md

checkpoints:
  - step-01  # Foco do caso: tipo penal, data da citação, anexos
  - step-04  # Seleção de teses (atipicidade / excludentes / nulidades / Tema 1.016)
  - step-06  # Aprovação da minuta
  - step-08  # Aprovação da versão final

# Loop de revisão (não-opcional): se o revisor (Step 07) emitir REJECT,
# o pipeline retorna ao Step 05 (redação) com as instruções de correção e
# repete até a peça receber APPROVE. Ver on_reject em step-07.

output:
  artifacts:
    - output/caso.md
    - output/resumo-autos.md
    - output/pesquisa-juridica.md
    - output/teses-selecionadas.md
    - output/resposta-acusacao-minuta.md
    - output/revisao-juridica.md
    - output/checklist-protocolo.md
    - output/resposta-acusacao-final.md
