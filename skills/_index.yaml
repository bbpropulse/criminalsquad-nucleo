# Índice de Skills — GERADO por `npx criminalsquad indexar-skills` (não editar à mão; será sobrescrito).
# Fonte de verdade para Arquiteto, Sherlock, chefe-roteador e catalog-scout.
# Lifecycle e maturidade são dimensões independentes; qualidade exige evidência.
# Última indexação determinística: 520 skills.

schema_version: 3
lifecycle_policy:
  legacy_default: active
  production_default: active
  explicit_opt_in: pilot
  blocked_in_production: [preview, deprecated, quarantined]

quality_policy:
  contract_version: "5.0.0"
  evidence_required: [verified, certified]
  structural_only: [contracted]
  blocked: [legacy, quarantined]
  implicit_selection_requires: high_performance_eligible
  contracted_execution_requires: supervised
  promotion_evidence_schema: "criminalsquad.skill-promotion-evidence/v1"
  label_without_computed_eligibility: blocked

discovery_policy:
  command: "npx criminalsquad search-skills --query <capability> --limit 8 --json"
  max_prompt_results: 8
  full_index_in_prompt: false
  query_must_exclude_case_data: true

