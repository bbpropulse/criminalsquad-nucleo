schema_version: 1

pack:
  id: execucao-penal-skills-v3-alta-performance-73
  imported_at: "2026-07-09"
  archive_sha256: "4bbd6e2bd667f344a166dae5e14897ff893dc4959d95ddbad30b41e21d21c16a"
  skills: 73
  lifecycle: preview
  reason: >-
    Conteúdo incorporado e estruturalmente validado, mas ainda não promovido
    para produção porque cálculo, vigência, eficácia e direito intertemporal
    da execução penal exigem casos-ouro, scripts determinísticos e Citation Gate.

integration_policy:
  exact_name_collisions: 0
  strategy: specialize_without_replacing
  general_skills_role: entrypoint_or_legacy_bridge
  ep_skills_role: specialized_preview
  load_policy: >-
    Não carregar uma skill geral e toda a cadeia ep-* simultaneamente. Selecionar
    uma entrypoint, uma competência analítica ou de cálculo, uma skill de peça e
    os gates estritamente necessários ao caso.
  production_rule: >-
    Ignorar skills com lifecycle preview em entregas finais, salvo teste explícito.
    Promover individualmente somente após os gates definidos neste manifesto.

mandatory_gates_before_promotion:
  - frontmatter_validado
  - skill_md_ate_500_linhas
  - referencias_internas_resolvidas
  - fonte_oficial_e_data_de_corte_registradas
  - vigencia_eficacia_cautelares_e_direito_intertemporal_separados
  - citation_gate_sem_pendencias
  - caso_ouro_favoravel_e_adversarial
  - calculo_deterministico_quando_aplicavel
  - revisor_independente
  - revisao_humana_juridica

